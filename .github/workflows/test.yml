name: "Backend Tests"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore NuGet packages
        working-directory: ./backend
        run: dotnet restore Tests/Backend.Tests.csproj

      - name: Run unit tests (no Docker)
        working-directory: ./backend
        run: |
          dotnet test Tests/Backend.Tests.csproj \
            --filter "FullyQualifiedName~Tests.Unit" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --no-restore

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: backend/Tests/TestResults/unit-test-results.trx
          retention-days: 30

  test-integration:
    needs: test-unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore NuGet packages
        working-directory: ./backend
        run: dotnet restore Tests/Backend.Tests.csproj

      - name: Run integration service tests (Testcontainers)
        working-directory: ./backend
        run: |
          dotnet test Tests/Backend.Tests.csproj \
            --filter "FullyQualifiedName~Tests.Integration.Services" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --no-restore

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: backend/Tests/TestResults/integration-test-results.trx
          retention-days: 30

  test-controllers:
    needs: test-unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore NuGet packages
        working-directory: ./backend
        run: dotnet restore Tests/Backend.Tests.csproj

      - name: Run controller tests (Testcontainers)
        working-directory: ./backend
        run: |
          dotnet test Tests/Backend.Tests.csproj \
            --filter "FullyQualifiedName~Tests.Integration.Controllers" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=controller-test-results.trx" \
            --no-restore

      - name: Upload controller test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: controller-test-results
          path: backend/Tests/TestResults/controller-test-results.trx
          retention-days: 30

  test-e2e:
    needs: [test-integration, test-controllers]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/*.csproj

      - name: Restore NuGet packages
        working-directory: ./backend
        run: dotnet restore Tests/Backend.Tests.csproj

      - name: Run E2E tests (WebApplicationFactory)
        working-directory: ./backend
        run: |
          dotnet test Tests/Backend.Tests.csproj \
            --filter "FullyQualifiedName~Tests.Integration.E2E" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=e2e-test-results.trx" \
            --no-restore

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: backend/Tests/TestResults/e2e-test-results.trx
          retention-days: 30
