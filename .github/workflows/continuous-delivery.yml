name: "Continuous Delivery"

on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string
    secrets:
      HETZNER_PROD_PRIVATE_SSH_KEY:
        required: true
      HETZNER_PROD_HOST:
        required: true
      HETZNER_PROD_USERNAME:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true

env:
  DEPLOY_ENV: production

jobs:
  deploy:
    env:
      REGISTRY: ghcr.io
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set environment variables
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          BRANCH="${{ github.ref_name }}"
          echo "BRANCH=${BRANCH//\//-}" >> $GITHUB_ENV

      - name: Setup cloudflared and SSH
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HETZNER_PROD_PRIVATE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

          ssh-add ~/.ssh/deploy_key

          cat >> ~/.ssh/config << SSHEOF
          Host ${{ secrets.HETZNER_PROD_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHEOF

      - name: Copy deployment assets to server
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          HOST="${{ secrets.HETZNER_PROD_USERNAME }}@${{ secrets.HETZNER_PROD_HOST }}"
          ASSETS="/tmp/deploy_assets_${{ github.run_id }}"

          ssh "$HOST" "mkdir -p $ASSETS/scripts"
          scp scripts/deploy.sh scripts/verify-deployment.sh "$HOST:$ASSETS/scripts/"
          scp docker-compose.prod.yml "$HOST:$ASSETS/"

      - name: Deploy and Verify
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          HOST="${{ secrets.HETZNER_PROD_USERNAME }}@${{ secrets.HETZNER_PROD_HOST }}"
          ASSETS="/tmp/deploy_assets_${{ github.run_id }}"
          TARGET_DIR="/home/${{ secrets.HETZNER_PROD_USERNAME }}/production"

          ssh "$HOST" bash << ENDSSH
          set -e
          export BRANCH="${{ env.BRANCH }}"
          export DOCKER_USERNAME="${{ github.actor }}"
          export DOCKER_PASSWORD="${{ secrets.GITHUB_TOKEN }}"
          export DEPLOY_DIR="$TARGET_DIR"
          mkdir -p "$TARGET_DIR/scripts"
          cp "$ASSETS/docker-compose.prod.yml" "$TARGET_DIR/docker-compose.yml"
          bash "$ASSETS/scripts/deploy.sh"
          bash "$ASSETS/scripts/verify-deployment.sh"
          ENDSSH

      - name: Cleanup Server
        if: always()
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          HOST="${{ secrets.HETZNER_PROD_USERNAME }}@${{ secrets.HETZNER_PROD_HOST }}"
          ASSETS="/tmp/deploy_assets_${{ github.run_id }}"
          ssh "$HOST" "
            rm -rf $ASSETS
            docker image prune -f
            docker volume prune -f
          "

      - name: Final Status Notices
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice::✅ Deployment successful!"
          else
            echo "::error::❌ Deployment failed!"
          fi
