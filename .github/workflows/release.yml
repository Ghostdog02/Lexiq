name: "Release"

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-docker:
    uses: ./.github/workflows/build-and-push-docker.yml
    with:
      config-path: .github/workflows/build-and-push-docker.yml
    permissions:
      contents: read
      packages: write

  pull-and-test:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Replace all slashesh with dashes
        run: |
          BRANCH="${{ github.ref_name }}"
          BRANCH="${BRANCH//\//-}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend image exists
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}-backend:${{ env.BRANCH }}
          echo "✅ Backend image successfully pulled from registry"

      - name: Verify frontend image exists
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}-frontend:${{ env.BRANCH }}
          echo "✅ Frontend image successfully pulled from registry"

  continuous-delivery:
    needs: pull-and-test
    uses: ./.github/workflows/continuous-delivery.yml
    permissions:
      packages: read
    with:
      config-path: .github/workflows/continuous-delivery.yml
    secrets:
      HETZNER_PROD_PRIVATE_SSH_KEY: ${{ secrets.HETZNER_PROD_PRIVATE_SSH_KEY }}
      HETZNER_PROD_HOST: ${{ secrets.HETZNER_PROD_HOST }}
      HETZNER_PROD_USERNAME: ${{ secrets.HETZNER_PROD_USERNAME }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}