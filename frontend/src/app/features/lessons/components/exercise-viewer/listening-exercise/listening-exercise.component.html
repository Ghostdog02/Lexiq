<div class="listening">
  @if (exercise.audioUrl) {
    <audio
      #audioEl
      [src]="exercise.audioUrl"
      (loadedmetadata)="onAudioLoaded(audioEl)"
      (timeupdate)="onTimeUpdate(audioEl)"
      (ended)="onEnded()">
    </audio>

    <div class="audio-widget">
      <div class="controls-row">
        <button
          type="button"
          class="play-btn"
          (click)="togglePlayPause()"
          [attr.aria-label]="isPlaying ? 'Pause audio' : 'Play audio'">
          @if (isPlaying) {
            <svg width="18" height="18" viewBox="0 0 14 14" fill="currentColor">
              <rect x="2" y="1" width="4" height="12" rx="1"/>
              <rect x="8" y="1" width="4" height="12" rx="1"/>
            </svg>
          } @else {
            <svg width="19" height="19" viewBox="0 0 16 16" fill="currentColor">
              <path d="M4 2.5L14 8L4 13.5V2.5Z"/>
            </svg>
          }
        </button>

        <div
          class="wave-wrap"
          (click)="seekByWaveform($event)"
          role="slider"
          [attr.aria-valuenow]="currentTime"
          [attr.aria-valuemin]="0"
          [attr.aria-valuemax]="duration"
          aria-label="Audio seek">
          <div class="track-label">Audio track</div>
          <svg
            class="waveform"
            width="100%"
            height="28"
            viewBox="0 0 480 28"
            preserveAspectRatio="none">
            @for (barHeight of BAR_HEIGHTS; track $index; let i = $index) {
              <rect
                [attr.x]="i * 10"
                [attr.y]="(28 - barHeight) / 2"
                width="6"
                [attr.height]="barHeight"
                rx="1.5"
                [attr.fill]="i < playedBars ? 'var(--accent-light)' : 'rgba(255,255,255,0.20)'"
              />
            }
          </svg>
        </div>

        <div class="timer">
          {{ formatTime(currentTime) }}<span class="timer-sep">/{{ formatTime(duration) }}</span>
        </div>

        <button
          type="button"
          class="replay-btn"
          (click)="replay()"
          [disabled]="exercise.maxReplays > 0 && replayCount >= exercise.maxReplays"
          aria-label="Replay audio">
          <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7A4.5 4.5 0 1 0 7 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M7 2.5L5 4.5M7 2.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      @if (exercise.maxReplays > 0) {
        <div class="replays-remaining">
          {{ exercise.maxReplays - replayCount }}
          {{ exercise.maxReplays - replayCount === 1 ? 'replay' : 'replays' }} remaining
        </div>
      }
    </div>
  } @else {
    <div class="no-audio">
      <span class="no-audio-icon">🔇</span>
      <p>No audio available</p>
    </div>
  }

  <app-base-exercise [exerciseId]="exercise.id" />
</div>
