<aside id="main-aside">
    @if (userIsAdmin) {
      <div class="admin-badge">
        <span class="crown-icon">👑</span>
        <span class="admin-text">ADMIN</span>
      </div>
    }

    <ul class="sidebar-links">
        <li><a routerLink="/"><span class="icon">🏠</span> Home</a></li>

        <li><a routerLink="/leaderboard"><span class="icon">🏆</span> Leaderboard</a></li>

        <li><a routerLink="/profile"><span class="icon">👤</span> Profile</a></li>

        <li><a routerLink="/help"><span class="icon">❓</span> Help</a></li>

        @if (userIsAuthenticated) {
          <li><a routerLink="/" (click)="authService.logoutUser()"><span class="icon">🚪</span> Logout</a></li>
        } @else {
          <li><a routerLink="/google-login"><span class="icon">🔑</span> Login</a></li>
        }
    </ul>
</aside>
