<div class="error-page" role="main">
  <div class="error-card" aria-label="Error details">
    <span class="status-code">{{ statusCode }}</span>
    <h1 class="title">{{ title }}</h1>
    <p class="message">{{ message }}</p>

    <a routerLink="/" class="btn primary" aria-label="Return to home page">
      Go Home
    </a>
  </div>
</div>
