worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;
    error_log  /dev/stderr warn;

    client_max_body_size 50m;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/otf
        image/svg+xml;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name relexiq.com www.relexiq.com;

        root /usr/share/nginx/html;
        index index.html;

        # Required for Google Sign-In popup to post the token back to the opener
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        # Docker health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API proxy — ^~ wins over static asset regex
        location ^~ /api {
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Static uploads proxy (audio, images, etc.)
        location ^~ /static/ {
            proxy_pass http://backend:8080/static/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Angular routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static asset caching
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|map)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
